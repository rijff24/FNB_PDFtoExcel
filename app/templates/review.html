<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bank Statement Review</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        body {
            background: radial-gradient(circle at top left, #f1f5ff 0, #f9fafb 45%, #eef2ff 100%);
        }

        main.container {
            max-width: 100%;
            padding-inline: 0.5rem;
        }

        .review-layout {
            display: flex;
            align-items: flex-start;
            gap: 0;
        }

        @media (max-width: 1024px) {
            .review-layout {
                flex-direction: column;
            }
            .review-layout .pdf-viewer,
            .review-layout .transactions-card {
                width: 100% !important;
            }
            .resize-handle { display: none; }
        }

        .pdf-viewer {
            position: relative;
            background: #020817;
            border-radius: 18px;
            padding: 0 0.75rem 0.75rem;
            box-shadow:
                0 18px 40px rgba(15, 23, 42, 0.45),
                0 0 0 1px rgba(148, 163, 184, 0.22);
            overflow-y: auto;
            max-height: 88vh;
            min-width: 200px;
            flex-shrink: 0;
        }

        .pdf-viewer h2 {
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #94a3b8;
            margin: 0;
            position: static;
            padding: 0.2rem 0 0.15rem;
        }

        .pdf-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0;
            font-size: 0.8rem;
            color: #9ca3af;
            position: sticky;
            top: 0;
            z-index: 7;
            background: #020817;
            padding: 0.1rem 0 0.35rem;
        }

        .pdf-toolbar label {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .pdf-toolbar input[type="range"] {
            width: 120px;
        }

        .pdf-canvas-wrapper {
            position: relative;
            overflow-x: scroll;
            overflow-y: visible;
            scrollbar-gutter: stable both-edges;
            margin-bottom: 0;
        }

        .sticky-x-scroll {
            position: sticky;
            bottom: 0;
            z-index: 9;
            height: 14px;
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .sticky-x-scroll > div {
            height: 1px;
        }

        .pdf-sticky-x {
            background: #020817;
            margin-bottom: 0;
        }

        .table-sticky-x {
            background: #ffffff;
        }

        .status {
            margin: 0.35rem 0 0;
        }

        .status:empty {
            display: none;
        }

        .pdf-page {
            position: relative;
            margin-bottom: 8px;
        }

        .pdf-page canvas {
            display: block;
            border-radius: 8px;
            background: #0b1120;
        }

        .pdf-page-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .pdf-highlight {
            position: absolute;
            border: 2px solid #22d3ee;
            background: rgba(34, 211, 238, 0.14);
            box-shadow:
                0 0 0 1px rgba(15, 23, 42, 0.7),
                0 0 0 6px rgba(34, 211, 238, 0.18);
            border-radius: 6px;
            transition: all 120ms ease-out;
        }

        /* ── Resize handle ── */
        .resize-handle {
            width: 8px;
            min-height: 200px;
            align-self: stretch;
            cursor: col-resize;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            user-select: none;
            z-index: 5;
        }

        .resize-handle-bar {
            width: 4px;
            height: 48px;
            border-radius: 2px;
            background: #cbd5e1;
            transition: background 150ms;
        }

        .resize-handle:hover .resize-handle-bar,
        .resize-handle.active .resize-handle-bar {
            background: #2563eb;
        }

        /* ── Transactions card ── */
        .transactions-card {
            border-radius: 18px;
            background: #ffffff;
            box-shadow:
                0 16px 35px rgba(15, 23, 42, 0.16),
                0 0 0 1px rgba(148, 163, 184, 0.28);
            padding: 0.75rem 1rem;
            min-width: 300px;
            flex: 1;
            overflow: hidden;
        }

        .table-toolbar {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-top: 0;
            flex-wrap: wrap;
            row-gap: 0.35rem;
            position: sticky;
            top: 0;
            z-index: 8;
            background: #ffffff;
            padding: 0.2rem 0;
        }

        .table-toolbar .toolbar-left,
        .table-toolbar .toolbar-right {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            flex-wrap: nowrap;
        }

        .tb-divider {
            width: 1px;
            height: 1.1rem;
            background: #e2e8f0;
            margin: 0 0.15rem;
            flex-shrink: 0;
        }

        .table-toolbar button,
        .table-toolbar .tb-icon-btn {
            all: unset;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid transparent;
            cursor: pointer;
            color: #475569;
            flex-shrink: 0;
            transition: background 100ms, border-color 100ms, color 100ms;
        }

        .table-toolbar button:hover,
        .table-toolbar .tb-icon-btn:hover {
            background: #f1f5f9;
            border-color: #e2e8f0;
            color: #1e293b;
        }

        .table-toolbar button:focus-visible,
        .table-toolbar .tb-icon-btn:focus-visible,
        .tb-text-btn:focus-visible,
        .tb-seg-option:focus-visible,
        .review-toggle-btn:focus-visible {
            outline: 3px solid #93c5fd;
            outline-offset: 2px;
        }

        .table-toolbar button:disabled,
        .table-toolbar .tb-icon-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: transparent;
            border-color: transparent;
        }

        .table-toolbar button:disabled:hover,
        .table-toolbar .tb-icon-btn:disabled:hover {
            background: transparent;
            border-color: transparent;
            color: #475569;
        }

        .tb-icon-btn.tb-active {
            background: #e0f2fe;
            border-color: #bae6fd;
            color: #0369a1;
        }

        .tb-text-btn {
            all: unset;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 6px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            transition: background 100ms;
            flex-shrink: 0;
        }

        .tb-text-btn:hover {
            background: #1d4ed8;
        }

        .tb-text-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .tb-segment {
            display: inline-flex;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .tb-seg-option {
            all: unset;
            padding: 3px 8px;
            font-size: 0.65rem;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            color: #64748b;
            border-right: 1px solid #e2e8f0;
            white-space: nowrap;
            transition: background 100ms, color 100ms;
            user-select: none;
        }

        .tb-seg-option:last-child {
            border-right: none;
        }

        .tb-seg-option:hover {
            background: #f8fafc;
        }

        .tb-seg-option.active {
            background: #e0e7ff;
            color: #3730a3;
            font-weight: 600;
        }

        .tb-label {
            font-size: 0.65rem;
            color: #64748b;
            font-weight: 500;
            white-space: nowrap;
            user-select: none;
        }

        .tb-zoom-group {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            flex-shrink: 0;
        }

        .tb-zoom-group input[type="range"] {
            width: 60px;
            height: 14px;
            cursor: pointer;
        }

        .tb-zoom-group input[type="checkbox"] {
            width: 13px;
            height: 13px;
            margin: 0;
            cursor: pointer;
        }

        #dirtyLabel {
            font-size: 0.65rem;
            color: #94a3b8;
            white-space: nowrap;
        }

        .cell-input {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            border: none;
            outline: none;
            background: transparent;
            font: inherit;
            text-align: inherit;
            padding: 0;
            margin: 0;
        }

        .review-cell {
            text-align: center;
        }

        .review-toggle-btn {
            all: unset;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.1rem;
            height: 1.1rem;
            border-radius: 4px;
            border: 1px solid #d1d5db;
            font-size: 0.8rem;
            line-height: 1;
            cursor: pointer;
        }

        .review-toggle-btn.review-blank {
            background: #ffffff;
            color: #6b7280;
        }

        .review-toggle-btn.review-needs {
            background: #fef3c7;
            border-color: #f97316;
            color: #f97316;
        }

        .review-toggle-btn.review-done {
            background: #ecfdf3;
            border-color: #22c55e;
            color: #16a34a;
        }

        .transactions-table-wrapper {
            max-height: 82vh;
            overflow-y: auto;
            overflow-x: auto;
            margin-top: 0.5rem;
            scrollbar-gutter: stable both-edges;
        }

        table.transactions {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            table-layout: fixed;
            user-select: none;
            -webkit-user-select: none;
        }

        table.transactions th,
        table.transactions td {
            padding: 0.4rem 0.5rem;
            border-bottom: 1px solid rgba(226, 232, 240, 0.9);
            border-right: 1px solid rgba(226, 232, 240, 0.5);
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        table.transactions th:last-child,
        table.transactions td:last-child {
            border-right: none;
        }

        table.transactions td.desc-cell {
            white-space: normal;
            word-break: break-word;
            min-width: 140px;
            overflow: visible;
            text-overflow: clip;
            line-height: 1.3;
        }

        table.transactions td.num-cell {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        table.transactions th.num-header {
            text-align: right;
        }

        /* Initial column widths (user can override via header drag) */
        .col-index   { width: 2.5rem; }
        .col-post-date { width: 5rem; }
        .col-transaction-date { width: 5rem; }
        .col-date    { width: 4.5rem; }
        .col-desc    { width: 14rem; }
        .col-reference { width: 16rem; }
        .col-amount  { width: 6.5rem; }
        .col-balance { width: 7rem; }
        .col-charges  { width: 5rem; }
        .col-category { width: 8rem; }
        .col-money-in { width: 6rem; }
        .col-money-out { width: 6rem; }
        .col-review  { width: 2.5rem; }

        table.transactions thead th {
            position: sticky;
            top: 0;
            background: #f8fafc;
            z-index: 7;
            font-size: 0.74rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #64748b;
        }

        .col-resizer {
            position: absolute;
            top: 0;
            right: 0;
            width: 6px;
            height: 100%;
            cursor: col-resize;
            user-select: none;
        }

        table.transactions tbody tr:nth-child(even) {
            background: #f9fafb;
        }

        table.transactions td[data-bbox] {
            cursor: pointer;
        }

        table.transactions td[data-bbox]:hover {
            background: rgba(34, 211, 238, 0.12);
        }

        table.transactions tr:hover {
            background: #e0f2fe;
            cursor: pointer;
        }

        tr.needs-review-row {
            background: #fef9c3;
        }

        tr.selected-row {
            background: rgba(59, 130, 246, 0.15) !important;
        }

        tr.selected-row.needs-review-row {
            background: rgba(59, 130, 246, 0.22) !important;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.12rem 0.5rem;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.75rem;
            padding-inline: 0.25rem;
        }

        .review-header h1 {
            margin-bottom: 0.1rem;
        }

        .review-meta {
            font-size: 0.82rem;
            color: #6b7280;
        }

        .table-toolbar .toolbar-right {
            margin-left: auto;
        }

        .link {
            font-size: 0.85rem;
            color: #2563eb;
        }
    </style>
</head>
<body>
<main class="container">
    <div class="review-header">
        <div>
            <h1>Statement Review</h1>
            <p class="review-meta">
                Session: <code>{{ session_id }}</code>
            </p>
        </div>
        <div>
            <a href="/" class="link">&larr; Back to upload</a> | <a href="/help" class="link">Help center</a>
        </div>
    </div>

    <section class="review-layout" id="reviewLayout">
        <div class="card pdf-viewer" id="pdfPanel">
            <h2>PDF</h2>
            <div class="pdf-toolbar">
                <label>
                    Zoom
                    <input id="zoomSlider" type="range" min="0.75" max="2.5" step="0.25" value="1.5" />
                </label>
                <span id="zoomValue">150%</span>
            </div>
            <div class="pdf-canvas-wrapper" id="pdfCanvasWrapper"></div>
            <div class="sticky-x-scroll pdf-sticky-x" id="pdfStickyX">
                <div id="pdfStickyXInner"></div>
            </div>
            <p id="pdfStatus" class="status"></p>
        </div>

        <div class="resize-handle" id="resizeHandle"><div class="resize-handle-bar"></div></div>

        <div class="transactions-card" id="tablePanel">
            <h2>Parsed transactions</h2>
            <p id="tableStatus" class="status"></p>

            <div class="table-toolbar" id="tableToolbar">
                <div class="toolbar-left">
                    <button type="button" class="tb-icon-btn" id="undoBtn" disabled title="Undo (Ctrl+Z)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                    </button>
                    <button type="button" class="tb-icon-btn" id="redoBtn" disabled title="Redo (Ctrl+Y)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
                    </button>
                    <span class="tb-divider"></span>
                    <button type="button" class="tb-icon-btn" id="addRowAboveBtn" disabled title="Insert row above">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><polyline points="5 12 12 5 19 12"/></svg>
                    </button>
                    <button type="button" class="tb-icon-btn" id="addRowBelowBtn" disabled title="Insert row below">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><polyline points="19 12 12 19 5 12"/></svg>
                    </button>
                    <button type="button" class="tb-icon-btn" id="deleteRowsBtn" disabled title="Delete selected rows (Del)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                    </button>
                    <span class="tb-divider"></span>
                    <button type="button" class="tb-icon-btn" id="saveBtn" disabled title="Save changes">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    </button>
                    <button type="button" class="tb-text-btn" id="downloadBtn" title="Download Excel file">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Export
                    </button>
                </div>
                <div class="toolbar-right">
                    <button type="button" class="tb-icon-btn tb-active" id="highlightToggle" title="Toggle PDF highlighting">
                        <svg id="hlIconOn" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg id="hlIconOff" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                    <span class="tb-divider"></span>
                    <span class="tb-label">Scroll</span>
                    <div class="tb-segment" id="scrollModeSegment">
                        <button type="button" class="tb-seg-option active" data-mode="auto" aria-pressed="true">Auto</button>
                        <button type="button" class="tb-seg-option" data-mode="synced" aria-pressed="false">Sync</button>
                        <button type="button" class="tb-seg-option" data-mode="none" aria-pressed="false">None</button>
                    </div>
                    <span class="tb-divider"></span>
                    <div class="tb-zoom-group">
                        <span class="tb-label">Tbl</span>
                        <input id="tableZoomSlider" type="range" min="0.5" max="2.5" step="0.1" value="1.0" title="Table zoom" />
                        <span class="tb-label" id="tableZoomValue">100%</span>
                    </div>
                    <div class="tb-zoom-group">
                        <input type="checkbox" id="syncZoomToggle" title="Sync PDF and table zoom" />
                        <span class="tb-label">Sync</span>
                    </div>
                    <span id="dirtyLabel"></span>
                </div>
            </div>

            <div class="transactions-table-wrapper">
                <table class="transactions" id="transactionsTable">
                    <colgroup id="transactionsColgroup">
                        <col class="col-index" />
                        <col class="col-date" />
                        <col class="col-desc" />
                        <col class="col-amount" />
                        <col class="col-balance" />
                        <col class="col-charges" />
                        <col class="col-review" />
                    </colgroup>
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Date</th>
                        <th>Description</th>
                        <th class="num-header">Amount</th>
                        <th class="num-header">Balance</th>
                        <th class="num-header">Charges</th>
                        <th>Review</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
    (function () {
        const sessionId = "{{ session_id }}";
        const pdfCanvasWrapper = document.getElementById("pdfCanvasWrapper");
        const pdfViewer = document.querySelector(".pdf-viewer");
        const pdfStickyX = document.getElementById("pdfStickyX");
        const pdfStickyXInner = document.getElementById("pdfStickyXInner");
        const pdfStatus = document.getElementById("pdfStatus");
        const tableStatus = document.getElementById("tableStatus");
        const tbody = document.querySelector("#transactionsTable tbody");
        const transactionsTable = document.getElementById("transactionsTable");
        const transactionsTableWrapper = document.querySelector(".transactions-table-wrapper");
        const tableStickyX = document.getElementById("tableStickyX");
        const tableStickyXInner = document.getElementById("tableStickyXInner");
        const transactionsColgroup = document.getElementById("transactionsColgroup");
        const transactionsHeaderRow = transactionsTable && transactionsTable.tHead
            ? transactionsTable.tHead.rows[0]
            : null;

        let transactions = [];
        let undoStack = [];
        let redoStack = [];
        let dirtyCount = 0;

        let pdfDoc = null;
        let currentZoom = 1.5;
        let lastBbox = null;
        let lastBboxPage = 0;
        let clearTimer = null;
        let activeColumns = [];
        let activeBankId = "fnb";
        let selectedRows = new Set();
        let lastClickedRow = null;
        let highlightEnabled = true;
        let scrollMode = "auto";
        let tableZoom = 1.0;
        let syncZoom = false;
        let scrollSource = null;
        let isZooming = false;
        let zoomGuardTimer = null;
        let renderGeneration = 0;
        let pageElements = [];
        let refreshPdfStickyX = function () {};
        let refreshTableStickyX = function () {};
        const PDF_SYNC_MIN = 1.0;
        const TABLE_SYNC_AT_PDF_MIN = 0.53;
        const PDF_SYNC_MAX = 2.5;
        const TABLE_SYNC_AT_PDF_MAX = 1.23;
        const SYNC_SLOPE = (TABLE_SYNC_AT_PDF_MAX - TABLE_SYNC_AT_PDF_MIN) / (PDF_SYNC_MAX - PDF_SYNC_MIN);
        const SYNC_INTERCEPT = TABLE_SYNC_AT_PDF_MIN - SYNC_SLOPE * PDF_SYNC_MIN;

        function mapPdfToTableZoom(pdfZoom) {
            return clamp(SYNC_SLOPE * pdfZoom + SYNC_INTERCEPT, 0.5, 2.5);
        }

        function mapTableToPdfZoom(tblZoom) {
            if (Math.abs(SYNC_SLOPE) < 1e-6) return clamp(currentZoom, 0.5, 2.5);
            return clamp((tblZoom - SYNC_INTERCEPT) / SYNC_SLOPE, 0.5, 2.5);
        }

        var BANK_TABLE_TEMPLATES = {
            fnb: [
                { field: "date", label: "Date", colClass: "col-date", bboxField: "bbox_date", numeric: false, editable: true, descCell: false },
                { field: "description", label: "Description", colClass: "col-desc", bboxField: "bbox_description", numeric: false, editable: true, descCell: true },

        function inferActiveBankId() {
            if (!transactions || !transactions.length) return "fnb";
            var candidate = String(transactions[0].bank_id || "").trim().toLowerCase();
            if (candidate && BANK_TABLE_TEMPLATES[candidate]) {
                return candidate;
            }
            var hasPostDate = transactions.some(function (tx) { return tx.post_date != null && String(tx.post_date).trim() !== ""; });
            var hasTransDate = transactions.some(function (tx) { return tx.transaction_date != null && String(tx.transaction_date).trim() !== ""; });
            var hasReference = transactions.some(function (tx) { return tx.reference != null && String(tx.reference).trim() !== ""; });
            if (hasPostDate || hasTransDate || hasReference) {
                return "capitec";
            }
            return "fnb";
        }

        function buildTableColumns() {
            activeBankId = inferActiveBankId();
            return (BANK_TABLE_TEMPLATES[activeBankId] || BANK_TABLE_TEMPLATES.fnb).slice();
        }
