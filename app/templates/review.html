        function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

        function getColumnValue(tx, col) {
            if (col.field === "debits") {
                var amount = Number(tx.amount);
                return !isNaN(amount) && amount < 0 ? Math.abs(amount) : null;
            }
            if (col.field === "credits") {
                var creditAmount = Number(tx.amount);
                return !isNaN(creditAmount) && creditAmount > 0 ? creditAmount : null;
            }
            if (col.field === "charges" && activeBankId === "standard_bank") {
                if (tx.charges != null && String(tx.charges).trim() !== "") {
                    return "#";
                }
                var desc = String(tx.description || "").toLowerCase();
                return desc.indexOf("fee") >= 0 ? "#" : "";
            }
            return tx[col.field];
        }

        function bindStickyHorizontalScrollbar(sourceEl, stickyEl, innerEl) {
            if (!sourceEl || !stickyEl || !innerEl) {
                return function () {};
            }
            var syncing = false;
            function refresh() {
                var fullWidth = Math.max(sourceEl.scrollWidth, sourceEl.clientWidth);
                innerEl.style.width = fullWidth + "px";
                stickyEl.scrollLeft = sourceEl.scrollLeft;
                stickyEl.style.display = sourceEl.scrollWidth > sourceEl.clientWidth + 1 ? "block" : "none";
            }
            sourceEl.addEventListener("scroll", function () {
                if (syncing) return;
                syncing = true;
                stickyEl.scrollLeft = sourceEl.scrollLeft;
                requestAnimationFrame(function () { syncing = false; });
            }, { passive: true });
            stickyEl.addEventListener("scroll", function () {
                if (syncing) return;
                syncing = true;
                sourceEl.scrollLeft = stickyEl.scrollLeft;
                requestAnimationFrame(function () { syncing = false; });
            }, { passive: true });
            window.addEventListener("resize", refresh);
            refresh();
            return refresh;
        }

        function formatCurrency(value) {
            if (value == null || value === "") return "";
            var num = Number(value);
            if (isNaN(num)) return String(value);
            var sign = num < 0 ? "-" : "";
            var abs = Math.abs(num).toFixed(2);
            var parts = abs.split(".");
            var intPart = parts[0];
            var decPart = parts[1];
            var grouped = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, " ");
            return sign + grouped + "." + decPart;
        }

        function setDirty(delta) {
            dirtyCount = Math.max(0, dirtyCount + delta);
            updateToolbarState();
        }

        function clearRedo() {
            redoStack = [];
        }

        function pushAction(action) {
            undoStack.push(action);
            if (undoStack.length > 50) {
                undoStack.shift();
            }
            clearRedo();
            setDirty(1);
        }

        function updateToolbarState() {
            var undoBtn = document.getElementById("undoBtn");
            var redoBtn = document.getElementById("redoBtn");
            var saveBtn = document.getElementById("saveBtn");
            var dirtyLabel = document.getElementById("dirtyLabel");

            if (undoBtn) undoBtn.disabled = undoStack.length === 0;
            if (redoBtn) redoBtn.disabled = redoStack.length === 0;
            if (saveBtn) saveBtn.disabled = dirtyCount === 0;
            if (dirtyLabel) {
                dirtyLabel.textContent = dirtyCount > 0
                    ? dirtyCount + " unsaved change" + (dirtyCount > 1 ? "s" : "")
                    : "";
            }
        }

        function updateSelectionToolbar() {
            var addAbove = document.getElementById("addRowAboveBtn");
            var addBelow = document.getElementById("addRowBelowBtn");
            var deleteBtn = document.getElementById("deleteRowsBtn");
            var hasSelection = selectedRows.size > 0;
            if (addAbove) addAbove.disabled = !hasSelection;
            if (addBelow) addBelow.disabled = !hasSelection;
            if (deleteBtn) deleteBtn.disabled = !hasSelection;
        }

        function clearSelection() {
            selectedRows.clear();
            updateSelectionToolbar();
        }

        function applySelectionClasses() {
            if (!tbody) return;
            var rows = tbody.querySelectorAll("tr");
            rows.forEach(function (tr, i) {
                if (selectedRows.has(i)) {
                    tr.classList.add("selected-row");
                } else {
                    tr.classList.remove("selected-row");
                }
            });
        }

        function handleRowSelection(index, e) {
            if (e.ctrlKey || e.metaKey) {
                if (selectedRows.has(index)) {
                    selectedRows.delete(index);
                } else {
                    selectedRows.add(index);
                }
                lastClickedRow = index;
            } else if (e.shiftKey && lastClickedRow !== null) {
                var lo = Math.min(lastClickedRow, index);
                var hi = Math.max(lastClickedRow, index);
                for (var i = lo; i <= hi; i++) {
                    selectedRows.add(i);
                }
            } else {
                if (selectedRows.size === 1 && selectedRows.has(index)) {
                    selectedRows.clear();
                    lastClickedRow = null;
                } else {
                    selectedRows.clear();
                    selectedRows.add(index);
                    lastClickedRow = index;
                }
            }
            applySelectionClasses();
            updateSelectionToolbar();
        }

        function makeEmptyRow() {
            var row = { needs_review: true, review_state: "blank" };
            if (transactions.length > 0) {
                row.bank_id = transactions[0].bank_id || activeBankId;
                row.page_index = 0;
            }
            if (activeColumns) {
                activeColumns.forEach(function (col) {
                    if (!(col.field in row)) row[col.field] = null;
                });
            }
            return row;
        }

        function midpointBbox(a, b) {
            if (!a && !b) return null;
            if (!a) return { x_min: b.x_min, y_min: b.y_min, x_max: b.x_max, y_max: b.y_max };
            if (!b) return { x_min: a.x_min, y_min: a.y_min, x_max: a.x_max, y_max: a.y_max };
            return {
                x_min: a.x_min,
                x_max: a.x_max,
                y_min: (a.y_min + b.y_min) / 2,
                y_max: (a.y_max + b.y_max) / 2,
            };
        }

        function deriveRowPosition(newRow, aboveTx, belowTx) {
            var refTx = aboveTx || belowTx;
            if (refTx) {
                newRow.page_index = refTx.page_index != null ? refTx.page_index : 0;
            }
            var aboveBbox = aboveTx ? (aboveTx.bbox_row || aboveTx.bbox || null) : null;
            var belowBbox = belowTx ? (belowTx.bbox_row || belowTx.bbox || null) : null;
            var synth = midpointBbox(aboveBbox, belowBbox);
            if (synth) {
                newRow.bbox_row = synth;
                newRow.bbox = synth;
            }
        }

        function insertRows(position) {
            var indices = Array.from(selectedRows).sort(function (a, b) { return a - b; });
            if (indices.length === 0) return;

            var inserted = [];
            if (position === "above") {
                for (var i = indices.length - 1; i >= 0; i--) {
                    var newRow = makeEmptyRow();
                    var belowTx = transactions[indices[i]] || null;
                    var aboveTx = indices[i] > 0 ? transactions[indices[i] - 1] : null;
                    deriveRowPosition(newRow, aboveTx, belowTx);
                    transactions.splice(indices[i], 0, newRow);
                    inserted.unshift({ index: indices[i], row: newRow });
                }
            } else {
                var offset = 0;
                for (var j = 0; j < indices.length; j++) {
                    var insertAt = indices[j] + 1 + offset;
                    var newRow = makeEmptyRow();
                    var aboveTx = transactions[insertAt - 1] || null;
                    var belowTx = transactions[insertAt] || null;
                    deriveRowPosition(newRow, aboveTx, belowTx);
                    transactions.splice(insertAt, 0, newRow);
                    inserted.push({ index: insertAt, row: newRow });
                    offset++;
                }
            }

            undoStack.push({ type: "insert_rows", entries: inserted });
            if (undoStack.length > 50) undoStack.shift();
            clearRedo();
            setDirty(1);
            clearSelection();
            renderTable();
        }

        function deleteSelectedRows() {
            var indices = Array.from(selectedRows).sort(function (a, b) { return b - a; });
            if (indices.length === 0) return;

            var removed = [];
            for (var i = 0; i < indices.length; i++) {
                var idx = indices[i];
                var row = transactions.splice(idx, 1)[0];
                removed.unshift({ index: idx, row: row });
            }

            undoStack.push({ type: "delete_rows", entries: removed });
            if (undoStack.length > 50) undoStack.shift();
            clearRedo();
            setDirty(1);
            clearSelection();
            renderTable();
        }

        function getReviewState(tx) {
            if (tx.review_state === "blank" || tx.review_state === "needs" || tx.review_state === "done") {
                return tx.review_state;
            }
            if (tx.needs_review) {
                return "needs";
            }
            return "blank";
        }

        function setPdfStatus(text) {
            if (pdfStatus) pdfStatus.textContent = text || "";
        }

        function setTableStatus(text) {
            if (tableStatus) tableStatus.textContent = text || "";
        }

        function clearHighlight() {
            pageElements.forEach(function (pe) {
                while (pe.overlay.firstChild) {
                    pe.overlay.removeChild(pe.overlay.firstChild);
                }
            });
        }

        function scheduleClear() {
            if (clearTimer) clearTimeout(clearTimer);
            clearTimer = setTimeout(function () {
                clearHighlight();
                clearTimer = null;
            }, 60);
        }

        function cancelClear() {
            if (clearTimer) {
                clearTimeout(clearTimer);
                clearTimer = null;
            }
        }

        function drawHighlight(bbox, pgIdx, scrollIntoView) {
            if (scrollIntoView === undefined) scrollIntoView = true;
            clearHighlight();
            if (!highlightEnabled) return;
            if (pgIdx == null) pgIdx = 0;
            var pe = pageElements[pgIdx];
            if (!pe || !bbox) return;

            var canvas = pe.canvas;
            if (!canvas.width || !canvas.height) return;

            lastBbox = bbox;
            lastBboxPage = pgIdx;

            var xMin = clamp(bbox.x_min, 0, 1);
            var yMin = clamp(bbox.y_min, 0, 1);
            var xMax = clamp(bbox.x_max, 0, 1);
            var yMax = clamp(bbox.y_max, 0, 1);

            var width = canvas.clientWidth;
            var height = canvas.clientHeight;

            var pad = 4;
            var left = Math.max(0, xMin * width - pad);
            var top = Math.max(0, yMin * height - pad);
            var boxWidth = (xMax - xMin) * width + pad * 2;
            var boxHeight = (yMax - yMin) * height + pad * 2;

            var rect = document.createElement("div");
            rect.className = "pdf-highlight";
            rect.style.left = left + "px";
            rect.style.top = top + "px";
            rect.style.width = boxWidth + "px";
            rect.style.height = boxHeight + "px";
            pe.overlay.appendChild(rect);

            if (scrollIntoView && pdfViewer && scrollMode === "auto") {
                var highlightCenterY = pe.wrapper.offsetTop + top + boxHeight / 2;
                var highlightCenterX = pe.wrapper.offsetLeft + left + boxWidth / 2;
                var wrapperOffsetY = pdfCanvasWrapper ? pdfCanvasWrapper.offsetTop : 0;
                var targetScrollTop = wrapperOffsetY + highlightCenterY - pdfViewer.clientHeight / 2;
                var targetScrollLeft = highlightCenterX - pdfViewer.clientWidth / 2;
                var maxTop = Math.max(0, pdfViewer.scrollHeight - pdfViewer.clientHeight);
                var maxLeft = Math.max(0, (pdfCanvasWrapper ? pdfCanvasWrapper.scrollWidth : 0) - (pdfCanvasWrapper ? pdfCanvasWrapper.clientWidth : 0));
                pdfViewer.scrollTo({ top: clamp(targetScrollTop, 0, maxTop), behavior: "smooth" });
                if (pdfCanvasWrapper) {
                    pdfCanvasWrapper.scrollTo({ left: clamp(targetScrollLeft, 0, maxLeft), behavior: "smooth" });
                }
            }
        }

        async function loadPdf() {
            setPdfStatus("Loading PDF...");
            try {
                var resp = await fetch("/preview/pdf/" + sessionId);
                if (!resp.ok) {
                    var text = await resp.text().catch(function () { return ""; });
                    setPdfStatus(
                        "Failed to load PDF (" +
                        resp.status +
                        "): " +
                        (text || "preview session may have expired or been reset.")
                    );
                    return;
                }

                var arrayBuffer = await resp.arrayBuffer();
                var loadingTask = window["pdfjsLib"].getDocument({ data: arrayBuffer });
                pdfDoc = await loadingTask.promise;
                pdfCanvasWrapper.innerHTML = "";
                pageElements = [];

                for (var i = 1; i <= pdfDoc.numPages; i++) {
                    await renderPageInContainer(i);
                }
                refreshPdfStickyX();
                setPdfStatus("");
            } catch (err) {
                console.error(err);
                setPdfStatus("Failed to load PDF: " + (err && err.message ? err.message : String(err)));
            }
        }

        async function renderPageInContainer(pageNumber) {
            if (!pdfDoc) return;
            try {
                var page = await pdfDoc.getPage(pageNumber);
                var viewport = page.getViewport({ scale: currentZoom });

                var wrapper = document.createElement("div");
                wrapper.className = "pdf-page";

                var canvas = document.createElement("canvas");
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                var overlay = document.createElement("div");
                overlay.className = "pdf-page-overlay";

                wrapper.appendChild(canvas);
                wrapper.appendChild(overlay);
                pdfCanvasWrapper.appendChild(wrapper);

                var idx = pageNumber - 1;
                var pe = { canvas: canvas, overlay: overlay, wrapper: wrapper, renderTask: null };
                pageElements[idx] = pe;

                var context = canvas.getContext("2d");
                pe.renderTask = page.render({ canvasContext: context, viewport: viewport });
                await pe.renderTask.promise;
                pe.renderTask = null;
            } catch (err) {
                if (err && err.name === "RenderingCancelledException") return;
                console.error(err);
                setPdfStatus("Failed to render page " + pageNumber + ": " + (err && err.message ? err.message : String(err)));
            }
        }

        async function rerenderAllPages() {
            if (!pdfDoc) return;
            renderGeneration++;
            var gen = renderGeneration;
            for (var i = 0; i < pageElements.length; i++) {
                if (gen !== renderGeneration) return;
                var pe = pageElements[i];
                if (!pe) continue;
                if (pe.renderTask) {
                    pe.renderTask.cancel();
                    pe.renderTask = null;
                }
                try {
                    var page = await pdfDoc.getPage(i + 1);
                    if (gen !== renderGeneration) return;
                    var viewport = page.getViewport({ scale: currentZoom });
                    pe.canvas.width = viewport.width;
                    pe.canvas.height = viewport.height;
                    var ctx = pe.canvas.getContext("2d");
                    pe.renderTask = page.render({ canvasContext: ctx, viewport: viewport });
                    await pe.renderTask.promise;
                    pe.renderTask = null;
                } catch (err) {
                    if (err && err.name === "RenderingCancelledException") continue;
                    console.error(err);
                }
            }
            if (gen === renderGeneration && lastBbox) {
                drawHighlight(lastBbox, lastBboxPage, false);
            }
            refreshPdfStickyX();
        }

        function renderTable() {
            tbody.innerHTML = "";
            if (!transactions || !transactions.length) {
                setTableStatus("No transactions to display.");
                return;
            }
            setTableStatus("");
            if (!activeColumns || !activeColumns.length) {
                configureTableStructure();
            }

            transactions.forEach(function (tx, index) {
                var tr = document.createElement("tr");
                tr.tabIndex = 0;
                var reviewState = getReviewState(tx);
                tx.review_state = reviewState;
                if (reviewState === "needs") {
                    tr.classList.add("needs-review-row");
                }

                var pageIndex = Number(tx.page_index != null ? tx.page_index : 0);
                var rowBbox = tx.bbox_row || tx.bbox || null;

                tr.dataset.pageIndex = String(pageIndex);
                tr.dataset.rowIndex = String(index);

                var indexTd = document.createElement("td");
                indexTd.textContent = String(index + 1);
                var valueTds = [];
                activeColumns.forEach(function (col) {
                    var td = document.createElement("td");
                    td.tabIndex = 0;
                    td.dataset.rowIndex = String(index);
                    td.dataset.field = col.field;
                    if (col.descCell) td.classList.add("desc-cell");
                    if (col.numeric) td.classList.add("num-cell");

                    var value = getColumnValue(tx, col);
                    td.textContent = col.numeric ? formatCurrency(value) : (value != null ? String(value) : "");
                    var bbox = tx[col.bboxField] || rowBbox;
                    if (bbox) td.dataset.bbox = JSON.stringify(bbox);
                    valueTds.push({ td: td, col: col });
                });

                var reviewTd = document.createElement("td");
                reviewTd.className = "review-cell";
                reviewTd.tabIndex = 0;
                reviewTd.dataset.rowIndex = String(index);
                reviewTd.dataset.field = "review_state";

                var checkbox = document.createElement("button");
                checkbox.type = "button";
                checkbox.className = "review-toggle-btn";
                checkbox.setAttribute("aria-label", "Toggle review state for row " + (index + 1));
                if (reviewState === "needs") {
                    checkbox.classList.add("review-needs");
                    checkbox.textContent = "!";
                } else if (reviewState === "done") {
                    checkbox.classList.add("review-done");
                    checkbox.textContent = "✓";
                } else {
                    checkbox.classList.add("review-blank");
                    checkbox.textContent = "";
                }
                reviewTd.appendChild(checkbox);

                var cells = [indexTd].concat(valueTds.map(function (entry) { return entry.td; })).concat([reviewTd]);
                cells.forEach(function (td) { tr.appendChild(td); });

                function attachCellHover(td) {
                    td.addEventListener("mouseenter", function () {
                        if (!highlightEnabled) return;
                        cancelClear();
                        var bbox = td.dataset.bbox ? JSON.parse(td.dataset.bbox) : rowBbox;
                        drawHighlight(bbox, pageIndex);
                    });
                    td.addEventListener("mouseleave", function () {
                        scheduleClear();
                    });
                }

                valueTds.forEach(function (entry) { attachCellHover(entry.td); });

                function attachEdit(td, field, isNumeric) {
                    td.addEventListener("dblclick", function (e) {
                        e.stopPropagation();
                        startEdit(td, index, field, isNumeric);
                    });
                    td.addEventListener("keydown", function (e) {
                        if (e.key === "Enter" && !td.dataset.editing) {
                            e.preventDefault();
                            startEdit(td, index, field, isNumeric);
                        }
                    });
                }

                valueTds.forEach(function (entry) {
                    if (entry.col.editable) {
                        attachEdit(entry.td, entry.col.field, !!entry.col.numeric);
                    }
                });

                reviewTd.addEventListener("click", function (e) {
                    e.stopPropagation();
                    var current = getReviewState(tx);
                    var next;
                    // "needs" is system-driven only; users can clear it to "done"
                    // but cannot manually set a row to "needs".
                    if (current === "needs") {
                        next = "done";
                    } else if (current === "blank") {
                        next = "done";
                    } else {
                        next = "blank";
                    }
                    var oldState = current;
                    var newState = next;
                    tx.review_state = newState;
                    tx.needs_review = newState === "needs";
                    pushAction({ txIndex: index, field: "review_state", oldValue: oldState, newValue: newState });
                    renderTable();
                });

                tr.addEventListener("click", function (e) {
                    handleRowSelection(index, e);
                    if (highlightEnabled) {
                        cancelClear();
                        drawHighlight(rowBbox, pageIndex);
                    }
                });
                tr.addEventListener("keydown", function (e) {
                    if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        handleRowSelection(index, e);
                        if (highlightEnabled) {
                            cancelClear();
                            drawHighlight(rowBbox, pageIndex);
                        }
                    }
                });

                tbody.appendChild(tr);
            });

            applySelectionClasses();
            updateSelectionToolbar();
        }

        async function loadTransactions() {
            setTableStatus("Loading transactions...");
            try {
                var resp = await fetch("/preview/data/" + sessionId);
                if (!resp.ok) {
                    var text = await resp.text().catch(function () { return ""; });
                    setTableStatus("Failed to load transactions: " + (text || resp.status));
                    return;
                }
                var payload = await resp.json();
                transactions = Array.isArray(payload.transactions) ? payload.transactions.slice() : [];
                undoStack = [];
                redoStack = [];
                dirtyCount = 0;
                configureTableStructure();
                renderTable();
                updateToolbarState();
            } catch (err) {
                console.error(err);
                setTableStatus("Failed to load transactions: " + (err && err.message ? err.message : String(err)));
            }
        }

        function applyChange(action, useNewValue) {
            var tx = transactions[action.txIndex];
            if (!tx) return;
            var value = useNewValue ? action.newValue : action.oldValue;
            tx[action.field] = value;
        }

        function undo() {
            var action = undoStack.pop();
            if (!action) return;

            if (action.type === "insert_rows") {
                var indices = action.entries.map(function (e) { return e.index; });
                indices.sort(function (a, b) { return b - a; });
                indices.forEach(function (idx) { transactions.splice(idx, 1); });
            } else if (action.type === "delete_rows") {
                action.entries.forEach(function (e) {
                    transactions.splice(e.index, 0, e.row);
                });
            } else {
                applyChange(action, false);
            }

            redoStack.push(action);
            setDirty(-1);
            clearSelection();
            renderTable();
        }

        function redo() {
            var action = redoStack.pop();
            if (!action) return;

            if (action.type === "insert_rows") {
                action.entries.forEach(function (e) {
                    transactions.splice(e.index, 0, e.row);
                });
            } else if (action.type === "delete_rows") {
                var indices = action.entries.map(function (e) { return e.index; });
                indices.sort(function (a, b) { return b - a; });
                indices.forEach(function (idx) { transactions.splice(idx, 1); });
            } else {
                applyChange(action, true);
            }

            undoStack.push(action);
            setDirty(1);
            clearSelection();
            renderTable();
        }

        function startEdit(td, rowIndex, field, isNumeric) {
            if (!td || td.dataset.editing === "1") return;
            var idx = Number(rowIndex);
            var tx = transactions[idx];
            if (!tx) return;

            td.dataset.editing = "1";
            var original = tx[field];
            var originalDisplay;
            if (isNumeric) {
                originalDisplay = formatCurrency(original);
            } else {
                originalDisplay = original == null ? "" : String(original);
            }

            var input = document.createElement("input");
            input.type = "text";
            input.value = originalDisplay;
            input.className = "cell-input";
            td.innerHTML = "";
            td.appendChild(input);
            input.focus();
            input.select();

            function finish(commit) {
                td.dataset.editing = "";
                if (!commit) {
                    renderTable();
                    return;
                }
                var newRaw = input.value.trim();
                var newValue = newRaw;
                if (isNumeric) {
                    if (newRaw === "") {
                        newValue = null;
                    } else {
                        var parsed = Number(newRaw.replace(/\\s/g, ""));
                        if (!isNaN(parsed)) {
                            newValue = parsed;
                        }
                    }
                }

                var oldVal = original;
                if (String(oldVal) === String(newValue)) {
                    renderTable();
                    return;
                }

                tx[field] = newValue;
                pushAction({ txIndex: idx, field: field, oldValue: oldVal, newValue: newValue });
                renderTable();
            }

            input.addEventListener("keydown", function (e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    finish(true);
                } else if (e.key === "Escape") {
                    e.preventDefault();
                    finish(false);
                }
            });

            input.addEventListener("blur", function () {
                finish(true);
            });
            refreshTableStickyX();
        }

        /* ── Draggable resize handle ── */
        (function initResizeHandle() {
            var handle = document.getElementById("resizeHandle");
            var layout = document.getElementById("reviewLayout");
            var pdfPanel = document.getElementById("pdfPanel");
            var tablePanel = document.getElementById("tablePanel");
            if (!handle || !layout || !pdfPanel || !tablePanel) return;

            var dragging = false;

            handle.addEventListener("mousedown", function (e) {
                e.preventDefault();
                dragging = true;
                handle.classList.add("active");
                document.body.style.cursor = "col-resize";
                document.body.style.userSelect = "none";
            });

            document.addEventListener("mousemove", function (e) {
                if (!dragging) return;
                var layoutRect = layout.getBoundingClientRect();
                var offsetX = e.clientX - layoutRect.left;
                var totalW = layoutRect.width;
                var handleW = handle.offsetWidth;

                var minPdf = 200;
                var minTable = 300;
                var pdfW = clamp(offsetX - handleW / 2, minPdf, totalW - minTable - handleW);

                pdfPanel.style.width = pdfW + "px";
            });

            document.addEventListener("mouseup", function () {
                if (!dragging) return;
                dragging = false;
                handle.classList.remove("active");
                document.body.style.cursor = "";
                document.body.style.userSelect = "";
            });
        })();

        function initColumnResize() {
            var table = document.getElementById("transactionsTable");
            var colgroup = document.getElementById("transactionsColgroup");
            if (!table || !table.tHead || !colgroup) return;

            var headers = table.tHead.rows[0].cells;
            var cols = colgroup.children;
            Array.from(headers).forEach(function (th) {
                Array.from(th.querySelectorAll(".col-resizer")).forEach(function (el) { el.remove(); });
            });

            var activeCol = null;
            var startX = 0;
            var startWidth = 0;

            function onMouseMove(e) {
                if (!activeCol) return;
                var dx = e.clientX - startX;
                var newWidth = Math.max(40, startWidth + dx);
                activeCol.style.width = newWidth + "px";
            }

            function onMouseUp() {
                if (!activeCol) return;
                activeCol = null;
                document.removeEventListener("mousemove", onMouseMove);
                document.removeEventListener("mouseup", onMouseUp);
                document.body.style.cursor = "";
                document.body.style.userSelect = "";
            }

            for (var i = 0; i < headers.length && i < cols.length; i++) {
                (function (index) {
                    var th = headers[index];
                    var col = cols[index];
                    th.style.position = "relative";
                    var resizer = document.createElement("span");
                    resizer.className = "col-resizer";
                    th.appendChild(resizer);

                    resizer.addEventListener("mousedown", function (e) {
                        e.preventDefault();
                        e.stopPropagation();
                        activeCol = col;
                        startX = e.clientX;
                        startWidth = th.offsetWidth || col.offsetWidth || 80;
                        document.body.style.cursor = "col-resize";
                        document.body.style.userSelect = "none";
                        document.addEventListener("mousemove", onMouseMove);
                        document.addEventListener("mouseup", onMouseUp);
                    });

                    resizer.addEventListener("dblclick", function (e) {
                        e.preventDefault();
                        e.stopPropagation();
                        var maxW = th.scrollWidth;
                        var bodyRows = table.tBodies[0] ? table.tBodies[0].rows : [];
                        for (var r = 0; r < bodyRows.length; r++) {
                            var cell = bodyRows[r].cells[index];
                            if (cell) {
                                maxW = Math.max(maxW, cell.scrollWidth);
                            }
                        }
                        col.style.width = (maxW + 8) + "px";
                    });
                })(i);
            }
        }

        function initToolbar() {
            var undoBtn = document.getElementById("undoBtn");
            var redoBtn = document.getElementById("redoBtn");
            var saveBtn = document.getElementById("saveBtn");
            var downloadBtn = document.getElementById("downloadBtn");
            var addAboveBtn = document.getElementById("addRowAboveBtn");
            var addBelowBtn = document.getElementById("addRowBelowBtn");
            var deleteBtn = document.getElementById("deleteRowsBtn");
            var hlToggle = document.getElementById("highlightToggle");
            var hlIconOn = document.getElementById("hlIconOn");
            var hlIconOff = document.getElementById("hlIconOff");

            if (addAboveBtn) addAboveBtn.addEventListener("click", function () { insertRows("above"); });
            if (addBelowBtn) addBelowBtn.addEventListener("click", function () { insertRows("below"); });
            if (deleteBtn) deleteBtn.addEventListener("click", function () { deleteSelectedRows(); });

            if (hlToggle) {
                hlToggle.addEventListener("click", function () {
                    highlightEnabled = !highlightEnabled;
                    if (highlightEnabled) {
                        hlToggle.classList.add("tb-active");
                        if (hlIconOn) hlIconOn.style.display = "";
                        if (hlIconOff) hlIconOff.style.display = "none";
                    } else {
                        hlToggle.classList.remove("tb-active");
                        if (hlIconOn) hlIconOn.style.display = "none";
                        if (hlIconOff) hlIconOff.style.display = "";
                        clearHighlight();
                        lastBbox = null;
                        if (scrollMode === "auto") {
                            scrollMode = "synced";
                            var seg = document.getElementById("scrollModeSegment");
                            if (seg) {
                                var opts = seg.querySelectorAll(".tb-seg-option");
                                opts.forEach(function (o) {
                                    o.classList.toggle("active", o.dataset.mode === "synced");
                                    o.setAttribute("aria-pressed", o.dataset.mode === "synced" ? "true" : "false");
                                });
                            }
                        }
                    }
                });
            }

            var segmentEl = document.getElementById("scrollModeSegment");
            if (segmentEl) {
                var segOptions = segmentEl.querySelectorAll(".tb-seg-option");
                segOptions.forEach(function (opt) {
                    opt.addEventListener("click", function () {
                        segOptions.forEach(function (o) { o.classList.remove("active"); });
                        opt.classList.add("active");
                        scrollMode = opt.dataset.mode;
                        segOptions.forEach(function (o) { o.setAttribute("aria-pressed", o === opt ? "true" : "false"); });
                    });
                });
            }

            var syncZoomToggle = document.getElementById("syncZoomToggle");
            if (syncZoomToggle) {
                syncZoomToggle.addEventListener("change", function () {
                    syncZoom = syncZoomToggle.checked;
                    if (syncZoom) {
                        tableZoom = mapPdfToTableZoom(currentZoom);
                        applyTableZoom();
                    }
                });
            }

            function getCookie(name) {
                var target = name + "=";
                var parts = document.cookie ? document.cookie.split(";") : [];
                for (var i = 0; i < parts.length; i++) {
                    var trimmed = parts[i].trim();
                    if (trimmed.indexOf(target) === 0) return decodeURIComponent(trimmed.substring(target.length));
                }
                return "";
            }

            if (undoBtn) undoBtn.addEventListener("click", function () { undo(); });
            if (redoBtn) redoBtn.addEventListener("click", function () { redo(); });

            if (saveBtn) {
                saveBtn.addEventListener("click", async function () {
                    if (dirtyCount === 0) return;
                    setTableStatus("Saving...");
                    try {
                        var resp = await fetch("/preview/data/" + sessionId, {
                            method: "PUT",
                            headers: {
                                "Content-Type": "application/json",
                                "X-CSRF-Token": getCookie("csrf_token"),
                            },
                            credentials: "same-origin",
                            body: JSON.stringify({ transactions: transactions }),
                        });
                        if (!resp.ok) {
                            var text = await resp.text().catch(function () { return ""; });
                            setTableStatus("Save failed: " + (text || resp.status));
                            return;
                        }
                        dirtyCount = 0;
                        setTableStatus("Saved.");
                    } catch (err) {
                        console.error(err);
                        setTableStatus("Save failed: " + (err && err.message ? err.message : String(err)));
                    } finally {
                        updateToolbarState();
                    }
                });
            }

            if (downloadBtn) {
                downloadBtn.addEventListener("click", function () {
                    window.location.href = "/preview/download/" + sessionId;
                });
            }

            document.addEventListener("keydown", function (e) {
                var active = document.activeElement;
                var isEditing = active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA" || active.isContentEditable);
                if (e.ctrlKey && !e.shiftKey && e.key.toLowerCase() === "z") {
                    e.preventDefault();
                    undo();
                } else if ((e.ctrlKey && e.key.toLowerCase() === "y") || (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "z")) {
                    e.preventDefault();
                    redo();
                } else if (e.key === "Delete" && !isEditing && selectedRows.size > 0) {
                    e.preventDefault();
                    deleteSelectedRows();
                } else if (e.key === "Escape") {
                    clearSelection();
                    applySelectionClasses();
                }
            });

            window.addEventListener("beforeunload", function (e) {
                if (dirtyCount > 0) {
                    e.preventDefault();
                    e.returnValue = "";
                }
            });

            updateToolbarState();
        }

        document.addEventListener("DOMContentLoaded", async function () {
            var zoomSlider = document.getElementById("zoomSlider");
            var zoomValue = document.getElementById("zoomValue");

            if (zoomSlider && zoomValue) {
                zoomSlider.value = String(currentZoom);
                zoomValue.textContent = Math.round(currentZoom * 100) + "%";

                zoomSlider.addEventListener("input", async function () {
                    var value = Number(zoomSlider.value || currentZoom);
                    if (!value || value <= 0.25) return;
                    currentZoom = value;
                    zoomValue.textContent = Math.round(currentZoom * 100) + "%";
                    if (pdfDoc) {
                        await rerenderAllPages();
                    }
                    if (syncZoom) {
                        tableZoom = mapPdfToTableZoom(currentZoom);
                        applyTableZoom();
                    }
                });
            }

            /* ── Synced scroll logic ── */
            var tableWrapper = document.querySelector(".transactions-table-wrapper");
            (function initSyncedScroll() {
                if (!pdfViewer || !tableWrapper) return;

                function smoothToward(current, target, alpha) {
                    return current * (1 - alpha) + target * alpha;
                }

                function clampScroll(el, top, left) {
                    var maxTop = Math.max(0, el.scrollHeight - el.clientHeight);
                    var maxLeft = Math.max(0, el.scrollWidth - el.clientWidth);
                    return {
                        top: clamp(top, 0, maxTop),
                        left: clamp(left, 0, maxLeft),
                    };
                }

                function horizontalFraction(el) {
                    var maxLeft = Math.max(0, el.scrollWidth - el.clientWidth);
                    return maxLeft > 0 ? el.scrollLeft / maxLeft : 0;
                }

                function getRowBboxCenter(tx) {
                    if (!tx) return null;
                    var bbox = tx.bbox_row || tx.bbox || null;
                    if (!bbox) return null;
                    return {
                        x: clamp((Number(bbox.x_min) + Number(bbox.x_max)) / 2, 0, 1),
                        y: clamp((Number(bbox.y_min) + Number(bbox.y_max)) / 2, 0, 1),
                    };
                }

                function findCenterRow() {
                    if (!tbody) return null;
                    var rows = tbody.querySelectorAll("tr");
                    if (!rows.length) return null;
                    var wrapperRect = tableWrapper.getBoundingClientRect();
                    var centerY = wrapperRect.top + wrapperRect.height / 2;
                    var best = null;
                    var bestDist = Infinity;
                    rows.forEach(function (row) {
                        var r = row.getBoundingClientRect();
                        var rowCenterY = r.top + r.height / 2;
                        var d = Math.abs(rowCenterY - centerY);
                        if (d < bestDist) {
                            bestDist = d;
                            best = row;
                        }
                    });
                    return best;
                }

                function findCenterPage() {
                    if (!pageElements.length) return 0;
                    var viewerRect = pdfViewer.getBoundingClientRect();
                    var centerY = viewerRect.top + viewerRect.height / 2;
                    var bestPage = 0;
                    var bestDist = Infinity;
                    for (var i = 0; i < pageElements.length; i++) {
                        var pe = pageElements[i];
                        if (!pe || !pe.wrapper) continue;
                        var r = pe.wrapper.getBoundingClientRect();
                        if (r.top <= centerY && r.bottom >= centerY) return i;
                        var pageCenterY = r.top + r.height / 2;
                        var d = Math.abs(pageCenterY - centerY);
                        if (d < bestDist) {
                            bestDist = d;
                            bestPage = i;
                        }
                    }
                    return bestPage;
                }

                function pdfScrollHandler() {
                    if (scrollMode !== "synced" || scrollSource === "table" || isZooming) return;
                    scrollSource = "pdf";

                    var pageIdx = findCenterPage();
                    var pe = pageElements[pageIdx];
                    if (!pe || !pe.wrapper) {
                        requestAnimationFrame(function () { scrollSource = null; });
                        return;
                    }

                    var viewerRect = pdfViewer.getBoundingClientRect();
                    var pageRect = pe.wrapper.getBoundingClientRect();
                    var viewerCenterY = viewerRect.top + viewerRect.height / 2;
                    var viewerCenterX = viewerRect.left + viewerRect.width / 2;
                    var normY = clamp((viewerCenterY - pageRect.top) / Math.max(1, pageRect.height), 0, 1);
                    var normX = clamp((viewerCenterX - pageRect.left) / Math.max(1, pageRect.width), 0, 1);

                    var rows = tbody ? tbody.querySelectorAll("tr") : [];
                    var bestRow = null;
                    var bestDist = Infinity;
                    rows.forEach(function (row) {
                        if (Number(row.dataset.pageIndex || 0) !== pageIdx) return;
                        var idx = Number(row.dataset.rowIndex || -1);
                        if (idx < 0 || idx >= transactions.length) return;
                        var center = getRowBboxCenter(transactions[idx]);
                        var y = center ? center.y : 0.5;
                        var d = Math.abs(y - normY);
                        if (d < bestDist) {
                            bestDist = d;
                            bestRow = row;
                        }
                    });

                    if (bestRow) {
                        var targetTop = bestRow.offsetTop + bestRow.offsetHeight / 2 - tableWrapper.clientHeight / 2;
                        var tableMaxLeft = Math.max(0, tableWrapper.scrollWidth - tableWrapper.clientWidth);
                        var sourceFracX = pdfCanvasWrapper ? horizontalFraction(pdfCanvasWrapper) : normX;
                        var targetLeft = sourceFracX * tableMaxLeft;
                        if (Math.abs(targetLeft - tableWrapper.scrollLeft) < 1) targetLeft = tableWrapper.scrollLeft;
                        var smoothedTop = smoothToward(tableWrapper.scrollTop, targetTop, 0.3);
                        var smoothedLeft = smoothToward(tableWrapper.scrollLeft, targetLeft, 0.3);
                        var clamped = clampScroll(tableWrapper, smoothedTop, smoothedLeft);
                        tableWrapper.scrollTop = clamped.top;
                        tableWrapper.scrollLeft = clamped.left;
                    }

                    requestAnimationFrame(function () { scrollSource = null; });
                }

                function pdfWrapperScrollHandler() {
                    // Horizontal scrolling happens on pdfCanvasWrapper, so this keeps sync responsive
                    // even when there is no vertical movement in pdfViewer.
                    if (scrollMode !== "synced" || scrollSource === "table" || isZooming) return;
                    pdfScrollHandler();
                }

                function tableScrollHandler() {
                    if (scrollMode !== "synced" || scrollSource === "pdf" || isZooming) return;
                    scrollSource = "table";

                    var row = findCenterRow();
                    if (!row) {
                        requestAnimationFrame(function () { scrollSource = null; });
                        return;
                    }

                    var pageIdx = Number(row.dataset.pageIndex || 0);
                    var rowIdx = Number(row.dataset.rowIndex || -1);
                    var pe = pageElements[pageIdx];
                    if (!pe || !pe.wrapper) {
                        requestAnimationFrame(function () { scrollSource = null; });
                        return;
                    }

                    var center = rowIdx >= 0 && rowIdx < transactions.length ? getRowBboxCenter(transactions[rowIdx]) : null;
                    var normY = center ? center.y : 0.5;
                    var tableNormX = tableWrapper.scrollWidth > 0
                        ? clamp((tableWrapper.scrollLeft + tableWrapper.clientWidth / 2) / tableWrapper.scrollWidth, 0, 1)
                        : 0.5;
                    var normX = tableNormX;
                    var targetTop = (pdfCanvasWrapper ? pdfCanvasWrapper.offsetTop : 0) + pe.wrapper.offsetTop + normY * pe.wrapper.clientHeight - pdfViewer.clientHeight / 2;
                    var pdfMaxLeft = Math.max(0, (pdfCanvasWrapper ? pdfCanvasWrapper.scrollWidth : 0) - (pdfCanvasWrapper ? pdfCanvasWrapper.clientWidth : 0));
                    var sourceFracX = horizontalFraction(tableWrapper);
                    var targetLeft = sourceFracX * pdfMaxLeft;
                    var currentPdfLeft = pdfCanvasWrapper ? pdfCanvasWrapper.scrollLeft : 0;
                    if (Math.abs(targetLeft - currentPdfLeft) < 1) targetLeft = currentPdfLeft;
                    var smoothedTop = smoothToward(pdfViewer.scrollTop, targetTop, 0.3);
                    var smoothedLeft = smoothToward(currentPdfLeft, targetLeft, 0.3);
                    var clampedTop = clamp(smoothedTop, 0, Math.max(0, pdfViewer.scrollHeight - pdfViewer.clientHeight));
                    var clampedLeft = clamp(
                        smoothedLeft,
                        0,
                        Math.max(0, (pdfCanvasWrapper ? pdfCanvasWrapper.scrollWidth : 0) - (pdfCanvasWrapper ? pdfCanvasWrapper.clientWidth : 0))
                    );
                    pdfViewer.scrollTop = clampedTop;
                    if (pdfCanvasWrapper) pdfCanvasWrapper.scrollLeft = clampedLeft;

                    requestAnimationFrame(function () { scrollSource = null; });
                }

                pdfViewer.addEventListener("scroll", pdfScrollHandler, { passive: true });
                if (pdfCanvasWrapper) {
                    pdfCanvasWrapper.addEventListener("scroll", pdfWrapperScrollHandler, { passive: true });
                }
                tableWrapper.addEventListener("scroll", tableScrollHandler, { passive: true });
            })();

            /* ── Table zoom logic ── */
            var tableZoomSlider = document.getElementById("tableZoomSlider");
            var tableZoomLabel = document.getElementById("tableZoomValue");

            function applyTableZoom() {
                if (transactionsTable) {
                    transactionsTable.style.transform = "scale(" + tableZoom + ")";
                    transactionsTable.style.transformOrigin = "top left";
                }
                if (tableZoomSlider) tableZoomSlider.value = String(tableZoom);
                if (tableZoomLabel) tableZoomLabel.textContent = Math.round(tableZoom * 100) + "%";
                refreshTableStickyX();
            }

            function applyPdfZoom() {
                if (zoomSlider) zoomSlider.value = String(currentZoom);
                if (zoomValue) zoomValue.textContent = Math.round(currentZoom * 100) + "%";
                if (pdfDoc) rerenderAllPages();
                refreshPdfStickyX();
            }

            if (tableZoomSlider) {
                tableZoomSlider.addEventListener("input", function () {
                    var val = Number(tableZoomSlider.value);
                    if (!val || val < 0.5) return;
                    tableZoom = val;
                    applyTableZoom();
                    if (syncZoom) {
                        currentZoom = mapTableToPdfZoom(tableZoom);
                        applyPdfZoom();
                    }
                });
            }

            /* Ctrl+Scroll / pinch zoom for both panels */
            if (tableWrapper) {
                tableWrapper.addEventListener("wheel", function (e) {
                    if (!e.ctrlKey) return;
                    e.preventDefault();
                    isZooming = true;
                    if (zoomGuardTimer) clearTimeout(zoomGuardTimer);
                    zoomGuardTimer = setTimeout(function () { isZooming = false; }, 350);
                    var delta = e.deltaY > 0 ? -0.025 : 0.025;
                    tableZoom = clamp(Math.round((tableZoom + delta) * 1000) / 1000, 0.5, 2.5);
                    applyTableZoom();
                    if (syncZoom) {
                        currentZoom = mapTableToPdfZoom(tableZoom);
                        applyPdfZoom();
                    }
                }, { passive: false });
            }

            if (pdfViewer) {
                pdfViewer.addEventListener("wheel", function (e) {
                    if (!e.ctrlKey) return;
                    e.preventDefault();
                    isZooming = true;
                    if (zoomGuardTimer) clearTimeout(zoomGuardTimer);
                    zoomGuardTimer = setTimeout(function () { isZooming = false; }, 350);
                    var delta = e.deltaY > 0 ? -0.025 : 0.025;
                    currentZoom = clamp(Math.round((currentZoom + delta) * 1000) / 1000, 0.5, 2.5);
                    applyPdfZoom();
                    if (syncZoom) {
                        tableZoom = mapPdfToTableZoom(currentZoom);
                        applyTableZoom();
                    }
                }, { passive: false });
            }

            /* Set initial PDF panel width to 45% of available space */
            var layout = document.getElementById("reviewLayout");
            var pdfPanel = document.getElementById("pdfPanel");
            if (layout && pdfPanel && window.innerWidth > 1024) {
                pdfPanel.style.width = Math.round(layout.clientWidth * 0.45) + "px";
            }

            refreshPdfStickyX = bindStickyHorizontalScrollbar(pdfCanvasWrapper, pdfStickyX, pdfStickyXInner);
            refreshTableStickyX = bindStickyHorizontalScrollbar(transactionsTableWrapper, tableStickyX, tableStickyXInner);
            refreshPdfStickyX();
            refreshTableStickyX();

            initToolbar();
            initColumnResize();
            await Promise.all([loadPdf(), loadTransactions()]);
        });
    })();
</script>
