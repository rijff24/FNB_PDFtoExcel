<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Help Center</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<main class="container help-layout">
    <h1>Help Center</h1>
    <p class="status">Signed in as {{ user_email }}.</p>
    <p><a href="/">&larr; Back to home</a></p>

    <section class="card help-shell">
        <aside class="help-nav">
            <h2>Topics</h2>
            <ul>
                {% for d in docs_nav %}
                <li>
                    {% if d.slug == selected_doc.slug %}
                    <strong>{{ d.title }}</strong>
                    {% else %}
                    <a href="/help?doc={{ d.slug }}">{{ d.title }}</a>
                    {% endif %}
                </li>
                {% endfor %}
            </ul>
        </aside>
        <article class="help-content">
            <h2>{{ selected_doc.title }}</h2>
            <div class="help-markdown">{{ selected_doc.html | safe }}</div>
        </article>
    </section>
</main>
</body>
</html>
