<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FNB PDF to Excel</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="bootstrapping">
    <div id="homeLoadingOverlay" class="loading-overlay" aria-live="polite">
        <div class="loading-card">
            <div class="throbber" aria-hidden="true"></div>
            <p>Loading your workspace...</p>
        </div>
    </div>
    <main id="homeAppShell" class="container">
        <h1>FNB PDF to Excel</h1>
        <p>Upload a statement PDF and download extracted transactions as Excel.</p>
        <p id="publicLinks">
            <span id="requestAccessWrap"><a href="/register">Request account access</a></span>
            <span id="adminLinkWrap" style="display:none;"> | <a href="/admin">Admin panel</a></span>
        </p>

        <section class="card" id="usageWidget" style="display:none;">
            <h2 class="upload-title">Usage this month</h2>
            <p id="usageSummary" class="status"></p>
            <p><a href="/billing">View detailed billing report</a></p>
        </section>

        <section class="card" id="authCard">
            <h2 class="auth-title">Access</h2>

            <div id="signedOutState" class="auth-block">
                <button type="button" id="googleSignInBtn">Sign in with Google</button>

                <div class="divider"></div>

                <label for="emailInput">Email</label>
                <input id="emailInput" type="email" autocomplete="email" />

                <label for="passwordInput">Password</label>
                <input id="passwordInput" type="password" autocomplete="current-password" />

                <button type="button" id="emailSignInBtn">Sign in with Email/Password</button>
            </div>

            <div id="signedInState" class="auth-block" style="display:none;">
                <p>Signed in as: <span id="userEmail"></span></p>
                <button type="button" id="signOutBtn">Sign out</button>
            </div>

            <p id="authStatus" class="status"></p>
        </section>

        <section class="card" id="uploadSection" style="display:none;">
            <h2 class="upload-title">Extract</h2>
            <form id="extractForm" action="/extract/preview" method="post" enctype="multipart/form-data" class="upload-form">
                <label for="file">Statement PDF</label>
                <input id="file" name="file" type="file" accept=".pdf,application/pdf" required />

                <label class="checkbox">
                    <input id="enable_ocr" type="checkbox" name="enable_ocr" value="true" checked />
                    Enable OCR (Google Document AI)
                </label>

                <div class="button-row">
                    <button id="previewBtn" type="submit" disabled>Preview &amp; review</button>
                </div>
                <p id="extractStatus" class="status"></p>
            </form>
        </section>
    </main>

    <script src="/static/firebase-auth.js"></script>
</body>
</html>
